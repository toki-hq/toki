name: ci

# Pipeline shape:
#
#   PR / push to main, release-* :
#     - test+coverage  (fmt, clippy, build, tests under llvm-cov)
#     - docker-server-smoke  (build the server image, don't push)
#
#   Tag push v*  (release flow):
#     - test+coverage  (gate: green before anything ships)
#     - docker-server-release  (multi-arch push to Docker Hub)
#     - client-release  (macOS/.app, Windows/.exe, Linux binary — all zipped)
#     - publish-release  (attach zips to the GitHub release for the tag)
#
# Secrets required for the release flow:
#   * DOCKERHUB_USERNAME — Docker Hub username for ellessen/toki-server pushes
#   * DOCKERHUB_TOKEN    — Docker Hub access token with read+write+delete
#   * GITHUB_TOKEN       — provided automatically; used by `gh release upload`

on:
  push:
    branches: [main, "release-*"]
    tags: ["v*"]
  pull_request:
    branches: [main, "release-*"]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  # ───────────────────────────────────────────────────────────────
  # Test + coverage in one job. Coverage runs the workspace tests
  # under llvm-cov, so an explicit `cargo test` step would be
  # redundant. `lcov.info` lands as an artifact for CI consumers
  # (codecov-action, manual download, etc.).
  # ───────────────────────────────────────────────────────────────
  test:
    name: test + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # The admin SPA is decoupled — it builds + ships as its own image
      # (see the `admin-ui` and `docker-admin-ui-*` jobs below), so the
      # server is a pure Rust build here with no Node step.
      - name: install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: install + cache system deps
        # eframe/winit/cpal pull a wide native dep set on Linux; the
        # apt-cache action restores from cache when the package list
        # hash matches. `version: 1.0` is the cache key — bump it
        # when the package list changes.
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >-
            protobuf-compiler
            libasound2-dev
            libgl1-mesa-dev
            libx11-dev
            libxcursor-dev
            libxi-dev
            libxkbcommon-dev libxkbcommon-x11-dev
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
            libopus-dev
            libudev-dev
          version: 1.2

      - name: cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: cache cargo tool installs
        # `~/.cargo/bin` isn't covered by rust-cache. Pinning on the
        # Cargo.lock hash keeps cargo-llvm-cov hot across runs.
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-bin-${{ runner.os }}-

      - name: install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        # `result_large_err` fires on tonic::Status in our generated
        # gRPC code — out of our control, downgrade to warn so CI
        # doesn't fail on it.
        run: cargo clippy --workspace --all-targets -- -W clippy::all -A clippy::result_large_err

      - name: tests + coverage
        # `coverage.sh --ci` builds, runs every test under
        # instrumentation, and emits target/coverage/lcov.info.
        # This is our single source of test signal — replaces the
        # split `cargo test` + `coverage` jobs the previous CI had.
        run: bash scripts/coverage.sh --ci

      - name: upload lcov
        uses: actions/upload-artifact@v5
        with:
          name: coverage-lcov
          path: target/coverage/lcov.info
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────
  # Admin UI: typecheck + build the standalone SPA and guard the
  # committed protobuf stubs against drift. Independent of the Rust
  # build now that the UI is decoupled.
  # ───────────────────────────────────────────────────────────────
  admin-ui:
    name: admin UI (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: install Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json

      - name: build
        working-directory: admin-ui
        run: |
          npm ci
          npm run gen
          git diff --exit-code src/gen || (echo "::error::src/gen is stale — run 'npm run gen' and commit" && exit 1)
          npm run build

  # ───────────────────────────────────────────────────────────────
  # Smoke-build the server Docker image on every PR and push to
  # main/release-* — verifies the Dockerfile still works without
  # publishing anything. Single-platform (amd64) for speed; the
  # multi-arch build is reserved for the tag-time release job.
  # ───────────────────────────────────────────────────────────────
  docker-server-smoke:
    name: docker server (smoke build)
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/checkout@v5

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scripts/server.dockerfile
          push: false
          load: false
          tags: toki-server:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/toki-hq/toki
            org.opencontainers.image.description=Toki server (smoke build)
            org.opencontainers.image.licenses=MIT

  # ───────────────────────────────────────────────────────────────
  # Smoke-build the standalone admin-UI Docker image on every PR and
  # push — verifies the Node build + nginx packaging still works.
  # ───────────────────────────────────────────────────────────────
  docker-admin-ui-smoke:
    name: docker admin-ui (smoke build)
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/checkout@v5

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scripts/admin-ui.dockerfile
          push: false
          load: false
          tags: toki-admin-ui:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/toki-hq/toki
            org.opencontainers.image.description=Toki admin UI (smoke build)
            org.opencontainers.image.licenses=MIT

  # ───────────────────────────────────────────────────────────────
  # Tag-only: multi-arch publish of `ellessen/toki-server` to
  # Docker Hub. Image tagged with the version (stripped of the
  # leading `v`) and `latest`. Gated on the test job so we never
  # ship a red build.
  # ───────────────────────────────────────────────────────────────
  docker-server-release:
    name: docker server (release)
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - name: set up QEMU
        # Needed for linux/arm64 cross-builds on an x86 runner.
        uses: docker/setup-qemu-action@v3

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: derive version from tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: build + push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scripts/server.dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ellessen/toki-server:${{ steps.tag.outputs.version }}
            ellessen/toki-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/toki-hq/toki
            org.opencontainers.image.description=Toki server
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ steps.tag.outputs.version }}

  # ───────────────────────────────────────────────────────────────
  # Tag-only: multi-arch publish of `ellessen/toki-admin-ui` to
  # Docker Hub, mirroring the server release. Gated on the test job.
  # ───────────────────────────────────────────────────────────────
  docker-admin-ui-release:
    name: docker admin-ui (release)
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - name: set up QEMU
        # Needed for linux/arm64 cross-builds on an x86 runner.
        uses: docker/setup-qemu-action@v3

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: derive version from tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: build + push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scripts/admin-ui.dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ellessen/toki-admin-ui:${{ steps.tag.outputs.version }}
            ellessen/toki-admin-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/toki-hq/toki
            org.opencontainers.image.description=Toki admin UI
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ steps.tag.outputs.version }}

  # ───────────────────────────────────────────────────────────────
  # Tag-only: build the desktop client on each OS in its native
  # form and ship a single zip per platform.
  #
  #   macOS    →  cargo-bundle produces Toki.app, zipped whole
  #   Windows  →  toki.exe, Compress-Archive'd
  #   Linux    →  toki binary, zip'd
  #
  # Per-platform jobs (rather than a matrix with shared steps)
  # because the install/build/package commands diverge enough that
  # `if: matrix.os == ...` would be more noise than savings.
  # ───────────────────────────────────────────────────────────────
  client-macos:
    name: client (macOS .app)
    runs-on: macos-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    # Build libopus from the audiopus_sys vendored source, statically:
    # OPUS_NO_PKG skips Homebrew's libopus (a dynamic link would make
    # Toki.app depend on a dylib absent on end-user machines); OPUS_STATIC
    # links the freshly-built static lib so the .app is self-contained.
    env:
      OPUS_NO_PKG: "1"
      OPUS_STATIC: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: install libopus build tools
        # The vendored libopus uses autotools to configure + build.
        run: brew install autoconf automake libtool

      - name: cache cargo-bundle install
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin
          key: cargo-bin-macos-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-bin-macos-

      - name: install protoc
        run: brew install protobuf

      - name: install cargo-bundle
        # `taiki-e/install-action` fetches a precompiled binary and
        # skips when the cache already has it — much faster than
        # `cargo install cargo-bundle`.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-bundle

      - name: derive version from tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: cargo bundle
        # Per the [package.metadata.bundle] block in client/Cargo.toml,
        # this produces target/release/bundle/osx/Toki.app.
        # `cargo bundle` rejects `--locked` (unlike `cargo build`),
        # so we rely on the lockfile being respected at the underlying
        # `cargo build` invocation cargo-bundle issues internally.
        run: cargo bundle -p toki-client --release

      - name: zip the .app
        run: |
          cd target/release/bundle/osx
          zip -r "$GITHUB_WORKSPACE/toki-client-${{ steps.tag.outputs.version }}-macos.zip" Toki.app

      - name: upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: toki-client-macos
          path: toki-client-*-macos.zip
          if-no-files-found: error

  client-windows:
    name: client (Windows .exe)
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    # Statically link the bundled MSVC libopus so toki.exe needs no
    # opus.dll alongside it.
    env:
      OPUS_STATIC: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: derive version from tag
        id: tag
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: build release
        run: cargo build -p toki-client --release --locked

      - name: zip the .exe
        # Use PowerShell's native Compress-Archive so we don't
        # depend on the runner's 7z install.
        shell: pwsh
        run: |
          $version = "${{ steps.tag.outputs.version }}"
          $out = "toki-client-$version-windows-x86_64.zip"
          Compress-Archive -Path target/release/toki.exe -DestinationPath $out

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: toki-client-windows
          path: toki-client-*-windows-x86_64.zip
          if-no-files-found: error

  client-linux:
    name: client (Linux binary)
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: install + cache system deps
        # Same package set as the test job — eframe/cpal need the
        # full native stack to *link*, even though end users only
        # need the runtime libs.
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >-
            protobuf-compiler
            libasound2-dev
            libgl1-mesa-dev
            libx11-dev
            libxcursor-dev
            libxi-dev
            libxkbcommon-dev libxkbcommon-x11-dev
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
            libopus-dev
            libudev-dev
          version: 1.2

      - name: derive version from tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: build release
        run: cargo build -p toki-client --release --locked

      - name: zip the binary
        run: |
          cd target/release
          zip "$GITHUB_WORKSPACE/toki-client-${{ steps.tag.outputs.version }}-linux-x86_64.zip" toki

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: toki-client-linux
          path: toki-client-*-linux-x86_64.zip
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────
  # Tag-only: download every client zip the platform-jobs produced
  # and attach them to the GitHub Release for this tag. The
  # release object is expected to already exist (created by the
  # operator via `gh release create v0.1.x` or the GitHub UI);
  # `--clobber` lets us re-run this job idempotently if a previous
  # attempt half-succeeded.
  # ───────────────────────────────────────────────────────────────
  publish-release:
    name: attach artifacts to GitHub release
    runs-on: ubuntu-latest
    needs: [docker-server-release, client-macos, client-windows, client-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: download all client artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: toki-client-*

      - name: collect zips into one folder
        run: |
          mkdir -p release-files
          find artifacts -name '*.zip' -exec cp {} release-files/ \;
          ls -la release-files

      - name: upload zips to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # `--clobber` makes re-runs safe: if a previous run already
          # uploaded some of the zips, the new ones replace them
          # rather than failing the job.
          gh release upload "$TAG" release-files/*.zip --clobber
