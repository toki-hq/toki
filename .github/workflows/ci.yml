name: ci

# Build + test + coverage on every push and PR. Linux only for the
# default matrix — macOS and Windows are valuable but eframe pulls in
# big native deps that triple CI time, so they're commented out
# below as an opt-in when there's something OS-specific to verify.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # os: [ubuntu-latest, macos-latest]  # opt in if needed
    steps:
      - uses: actions/checkout@v4

      - name: install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: install + cache system deps (linux)
        if: matrix.os == 'ubuntu-latest'
        # `cache-apt-pkgs-action` resolves the requested packages,
        # restores them from cache when the list hash matches, or
        # downloads + installs + repopulates the cache when it
        # doesn't. Saves ~30-60s on every run after the first.
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          # Full set eframe + winit + cpal need on Linux. The X11
          # libs (libx11, libxcursor, libxi, libxkbcommon, libxcb*)
          # back the windowing + input plumbing; libgl1-mesa-dev
          # gives egui_glow an OpenGL implementation to link
          # against; libasound2-dev is cpal's ALSA backend.
          packages: >-
            protobuf-compiler
            libasound2-dev
            libgl1-mesa-dev
            libx11-dev
            libxcursor-dev
            libxi-dev
            libxkbcommon-dev libxkbcommon-x11-dev
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
          version: 1.0

      - name: install protobuf (macos)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf

      - name: cache cargo registry + build
        # Rust-cache covers ~/.cargo/registry, ~/.cargo/git, and
        # ./target. Apt deps are cached separately above.
        uses: Swatinem/rust-cache@v2

      - name: cache cargo tool installs
        # `~/.cargo/bin` isn't covered by rust-cache. Pinning it on
        # the Cargo.lock hash lets cargo-llvm-cov + any future
        # `cargo install` come back from cache instead of compiling.
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-bin-${{ runner.os }}-

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        # `-D warnings` would catch the long-standing
        # `result_large_err` on tonic::Status; downgrade to warn so
        # CI doesn't fail on something inherent to the gRPC API.
        run: cargo clippy --workspace --all-targets -- -W clippy::all -A clippy::result_large_err

      - name: build
        run: cargo build --workspace --all-targets --locked

      - name: test
        run: cargo test --workspace --locked

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: install + cache system deps
        # Same package set + version key as the `test` job above so
        # the apt cache is shared across both jobs in the same run.
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >-
            protobuf-compiler
            libasound2-dev
            libgl1-mesa-dev
            libx11-dev
            libxcursor-dev
            libxi-dev
            libxkbcommon-dev libxkbcommon-x11-dev
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
          version: 1.0

      - uses: Swatinem/rust-cache@v2

      - name: cache cargo tool installs
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-bin-${{ runner.os }}-

      - name: install cargo-llvm-cov
        # `taiki-e/install-action` skips re-download when the binary
        # is already present in ~/.cargo/bin (i.e. when the cache
        # above restored it), so the cache + install pair is cheap.
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: run coverage
        run: bash scripts/coverage.sh --ci

      - name: upload lcov
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: target/coverage/lcov.info
          if-no-files-found: error

      # Uncomment + add CODECOV_TOKEN to repo secrets to publish.
      # - name: upload to codecov
      #   uses: codecov/codecov-action@v4
      #   with:
      #     files: target/coverage/lcov.info
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     fail_ci_if_error: true

  build-server-docker-image:
    name: Build Docker image for server
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: scripts/server.dockerfile
          tags: toki-server:latest
          labels: |
            org.opencontainers.image.source=https://github.com/toki-hq/toki
            org.opencontainers.image.description=Toki server Docker image
            org.opencontainers.image.licenses=MIT