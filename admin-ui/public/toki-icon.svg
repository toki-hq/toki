
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1c1e"></stop>
      <stop offset="55%" stop-color="#0a0b0a"></stop>
      <stop offset="100%" stop-color="#040504"></stop>
    </linearGradient>
    
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="oklch(0.86 0.18 145 / 0.55)"></stop>
      <stop offset="55%" stop-color="oklch(0.86 0.18 145 / 0.06)"></stop>
      <stop offset="100%" stop-color="oklch(0.86 0.18 145 / 0)"></stop>
    </radialGradient>
    
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="bloomSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225"></rect>
    </clipPath>
    
    <pattern id="scan" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="transparent"></rect>
      <line x1="0" y1="2" x2="6" y2="2" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"></line>
    </pattern>
  </defs>

  <g clip-path="url(#squircle)">
    
    <rect width="1024" height="1024" fill="url(#bg)"></rect>
    
    <rect width="1024" height="1024" fill="url(#glow)"></rect>

    
    <circle cx="512" cy="512" r="378" fill="none" stroke="oklch(0.32 0.10 145)" stroke-width="10"></circle>
    <circle cx="512" cy="512" r="378" fill="none" stroke="oklch(0.86 0.18 145 / 0.45)" stroke-width="3"></circle>

    
    <g fill="oklch(0.42 0.11 145)">
      
      <circle cx="318" cy="276" r="20"></circle><circle cx="388" cy="276" r="20"></circle><circle cx="458" cy="276" r="20"></circle>
      <circle cx="528" cy="276" r="20"></circle><circle cx="598" cy="276" r="20"></circle><circle cx="668" cy="276" r="20"></circle>
      
      <circle cx="283" cy="336" r="20"></circle><circle cx="353" cy="336" r="20"></circle>
      <circle cx="633" cy="336" r="20"></circle><circle cx="703" cy="336" r="20"></circle>
      
      <circle cx="248" cy="396" r="20"></circle><circle cx="318" cy="396" r="20"></circle>
      <circle cx="668" cy="396" r="20"></circle><circle cx="738" cy="396" r="20"></circle>
      
      <circle cx="248" cy="456" r="20"></circle>
      <circle cx="738" cy="456" r="20"></circle>
      
      <circle cx="248" cy="516" r="20"></circle>
      <circle cx="738" cy="516" r="20"></circle>
      
      <circle cx="248" cy="576" r="20"></circle>
      <circle cx="738" cy="576" r="20"></circle>
      
      <circle cx="248" cy="636" r="20"></circle><circle cx="318" cy="636" r="20"></circle>
      <circle cx="668" cy="636" r="20"></circle><circle cx="738" cy="636" r="20"></circle>
      
      <circle cx="283" cy="696" r="20"></circle><circle cx="353" cy="696" r="20"></circle>
      <circle cx="633" cy="696" r="20"></circle><circle cx="703" cy="696" r="20"></circle>
      
      <circle cx="318" cy="756" r="20"></circle><circle cx="388" cy="756" r="20"></circle><circle cx="458" cy="756" r="20"></circle>
      <circle cx="528" cy="756" r="20"></circle><circle cx="598" cy="756" r="20"></circle><circle cx="668" cy="756" r="20"></circle>
    </g>

    
    <g fill="oklch(0.62 0.15 145)" filter="url(#bloomSoft)">
      
      <circle cx="388" cy="396" r="24"></circle><circle cx="458" cy="396" r="24"></circle>
      <circle cx="528" cy="396" r="24"></circle><circle cx="598" cy="396" r="24"></circle>
      
      <circle cx="353" cy="456" r="24"></circle><circle cx="423" cy="456" r="24"></circle>
      <circle cx="563" cy="456" r="24"></circle><circle cx="633" cy="456" r="24"></circle>
      
      <circle cx="318" cy="516" r="24"></circle>
      <circle cx="668" cy="516" r="24"></circle>
      
      <circle cx="353" cy="576" r="24"></circle><circle cx="423" cy="576" r="24"></circle>
      <circle cx="563" cy="576" r="24"></circle><circle cx="633" cy="576" r="24"></circle>
      
      <circle cx="388" cy="636" r="24"></circle><circle cx="458" cy="636" r="24"></circle>
      <circle cx="528" cy="636" r="24"></circle><circle cx="598" cy="636" r="24"></circle>
    </g>

    
    <g fill="oklch(0.92 0.20 145)" filter="url(#bloom)">
      <circle cx="458" cy="456" r="28"></circle>
      <circle cx="528" cy="456" r="28"></circle>
      <circle cx="423" cy="516" r="28"></circle>
      <circle cx="493" cy="516" r="28"></circle>
      <circle cx="563" cy="516" r="28"></circle>
      <circle cx="458" cy="576" r="28"></circle>
      <circle cx="528" cy="576" r="28"></circle>
    </g>

    
    <circle cx="493" cy="516" r="36" fill="oklch(0.98 0.22 145)" filter="url(#bloom)"></circle>
    <circle cx="493" cy="516" r="14" fill="white"></circle>

    
    <rect width="1024" height="1024" fill="url(#scan)" opacity="0.55"></rect>
  </g>

  
  <rect x="1" y="1" width="1022" height="1022" rx="225" ry="225" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"></rect>
</svg>