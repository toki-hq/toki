syntax = "proto3";

package toki.admin.v1;

// Admin control-plane service for the Toki server's web panel.
//
// Served as gRPC-Web over the admin TLS listener (default :8000), same
// origin as the React SPA. Authentication is the HttpOnly `toki_admin_session`
// cookie the browser auto-attaches; a server-side interceptor + per-RPC guard
// validate it (login/logout remain tiny HTTP endpoints that set/clear the
// cookie, since gRPC can't ergonomically issue Set-Cookie).
//
// `Watch` replaces the old Server-Sent Events stream: the server pushes a
// fresh Snapshot on subscribe, on a ~1 Hz tick, and immediately after every
// successful mutation.
service Admin {
  // Live registry stream. The first message lands immediately on subscribe.
  rpc Watch(WatchRequest) returns (stream Snapshot);

  // One-shot reads.
  rpc GetServerInfo(GetServerInfoRequest) returns (ServerInfo);
  rpc GetServerConfig(GetServerConfigRequest) returns (ServerConfig);

  // Runtime configuration (persisted to admin.db, hot-applied).
  rpc UpdateServerConfig(UpdateServerConfigRequest) returns (ServerConfig);
  // FAILED_PRECONDITION if the gRPC password is pinned in config.toml.
  rpc SetServerPassword(SetServerPasswordRequest) returns (SetServerPasswordResponse);

  // Admin account.
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);

  // Per-client operator actions. NOT_FOUND if the client id is unknown.
  rpc KickClient(KickClientRequest) returns (KickClientResponse);
  rpc MoveClient(MoveClientRequest) returns (MoveClientResponse);
  rpc RenameClient(RenameClientRequest) returns (RenameClientResponse);
  rpc SetPriority(SetPriorityRequest) returns (SetPriorityResponse);
  // Server-side mute: revoke (or restore) a member's ability to take
  // the PTT floor, without disconnecting them. A muted member's press
  // is refused server-side — they stay connected and keep hearing the
  // channel; they just can't transmit. The gentle lever between
  // "nothing" and kick/ban. Session-scoped (clears on disconnect);
  // NOT_FOUND for an unknown client id. If the member currently holds
  // the floor, muting drops it immediately so the channel frees up.
  rpc SetMute(SetMuteRequest) returns (SetMuteResponse);

  // ── Identity bans ───────────────────────────────────────────────
  // Ban a connected member's *identity* (and optionally its machine
  // hash) and kick the live session. Future registers presenting the
  // banned identity — or, for a machine ban, the banned machine hash
  // under ANY identity — are rejected with PERMISSION_DENIED + the
  // reason. NOT_FOUND for an unknown client id; FAILED_PRECONDITION
  // when the member registered without an identity (nothing durable
  // to ban — kick is the only lever for those).
  rpc BanClient(BanClientRequest) returns (BanClientResponse);
  // Every active ban, newest-first.
  rpc ListBans(ListBansRequest) returns (ListBansResponse);
  // Lift a ban by banned pubkey. Idempotent (lifting an unknown ban
  // is a no-op success, so a double-click never errors).
  rpc LiftBan(LiftBanRequest) returns (LiftBanResponse);

  // Named channels. Assign or clear the human-readable name of a
  // frequency (empty `name` clears it). FAILED_PRECONDITION when the
  // feature is disabled; INVALID_ARGUMENT for a bad frequency or a name
  // longer than 16 chars. Names persist independently of room occupancy.
  // Channel-wide mute: silence transmission on a whole frequency. While
  // a channel is muted, no member tuned to it may take the PTT floor;
  // moving to another (unmuted) channel restores the ability to talk.
  // Enforced by the same relay speak-gate as member mute. Persists
  // independently of occupancy (like channel names). INVALID_ARGUMENT
  // for a bad frequency.
  rpc SetChannelMute(SetChannelMuteRequest) returns (SetChannelMuteResponse);
  rpc SetChannelName(SetChannelNameRequest) returns (SetChannelNameResponse);
  // Clear every channel name in one shot.
  rpc ClearAllChannelNames(ClearAllChannelNamesRequest) returns (ClearAllChannelNamesResponse);

  // ── Metrics / KPIs / audit ──────────────────────────────────────
  // Time-series of voice-relay bandwidth + peer count, persisted at
  // 1-minute resolution. Server downsamples to a bounded point count
  // for the requested window.
  rpc GetMetrics(MetricsRequest) returns (MetricsResponse);
  // Point-in-time host health (CPU / memory / disk), sampled in the
  // background so this read is cheap.
  rpc GetServerHealth(GetServerHealthRequest) returns (ServerHealth);
  // Paged, filtered audit log (admin actions + security + connect /
  // disconnect). Newest-first; page backwards with `before_id`.
  rpc GetAuditLog(AuditLogRequest) returns (AuditLogResponse);
}

// ── Live state ────────────────────────────────────────────────────

message Snapshot {
  repeated Room rooms = 1;          // frequency-sorted
  repeated Member lobby = 2;        // clients on no frequency
  uint64 generation = 3;            // monotonic; lets the UI detect gaps
  uint64 server_uptime_secs = 4;
  // Admin-assigned channel names, keyed by canonical frequency. Carries
  // ALL named channels regardless of occupancy (names persist when a
  // room empties), so the panel can label unoccupied frequencies too.
  // Absent key = unnamed. Empty unless named_channels_enabled is on.
  map<string, string> channel_names = 5;
  // Live voice-relay throughput over the last ~1 s tick, bytes/sec. Lets
  // the dashboard draw a real-time bandwidth trace off the Watch stream
  // (the persisted GetMetrics series is 1-minute granularity).
  uint64 rx_bytes_per_sec = 6;
  uint64 tx_bytes_per_sec = 7;
  // Canonical frequencies currently muted channel-wide (no one may
  // transmit). Carries ALL muted channels regardless of occupancy, so
  // the panel can flag an empty-but-muted frequency. Independent of the
  // named-channels feature — channel mute is always available.
  repeated string muted_channels = 8;
}

message Room {
  string frequency = 1;             // canonical "446.05"
  optional string holder = 2;       // client_id of the current PTT holder
  repeated Member members = 3;
  // True when this whole channel is muted (see Admin.SetChannelMute) —
  // no member tuned here can transmit. Convenience mirror of the
  // Snapshot.muted_channels entry for this frequency.
  bool muted = 4;
}

message Member {
  string id = 1;                    // client_id (UUID)
  string display_name = 2;
  uint64 connected_secs = 3;        // since Register
  bool priority = 4;                // priority speaker on this room's frequency

  // ── Client identity (optional) ──────────────────────────────────
  // Present only when the member registered with a verified keypair
  // identity; all four fields are empty/zero for identity-less
  // sessions (pre-identity clients, or identity disabled client-side).

  // Human-readable identity string, e.g. "7Q4XF9KB" (8-char base32
  // fingerprint of the public key). Stable across sessions and
  // display-name changes — the durable "who".
  string identity = 5;
  // Full 32-byte ed25519 public key as lowercase hex — the canonical
  // identity key, shown in the panel's hover detail and used to
  // correlate with the identities table / audit log.
  string identity_pubkey = 6;
  // Salted machine-fingerprint hash (lowercase hex) the client
  // presented at register. Lets an operator spot "fresh identity,
  // previously-seen machine" after a config wipe. Claimed, not provable.
  string identity_machine_hash = 7;
  // Unix time this identity was first seen by THIS server (from the
  // identities table). 0 when absent.
  uint64 identity_first_seen_unix = 8;

  // Server-side mute (see Admin.SetMute). When true, the server
  // refuses this session's PTT presses — it stays connected and
  // hears the channel but cannot transmit. Session-scoped.
  bool muted = 9;

  // ── Connection quality (client-reported) ────────────────────────
  // Most-recent metrics the client reported via
  // Signaling.ReportConnectionQuality. All zero until the first report
  // lands (a just-connected member, or a pre-0.5.0 client that never
  // reports). `quality_fresh` distinguishes "0 ms, freshly reported"
  // from "never reported": false ⇒ show a dash, not green bars.
  uint32 rtt_ms = 10;
  uint32 jitter_ms = 11;
  // Loss percentage ×100 (250 = 2.50%); see ConnectionQualityReport.
  uint32 loss_pct_centi = 12;
  // True once at least one quality report has been received for this
  // session. Gates the panel between "—" and an actual reading.
  bool quality_fresh = 13;
}

// ── Server metadata + config ──────────────────────────────────────

message ServerInfo {
  string version = 1;
  string admin_bind = 2;
  uint64 started_at_unix = 3;
  bool toml_password_override = 4;  // server password pinned in TOML → SetServerPassword locked
}

// Runtime-tunable settings. NOTE: `grpc_password` is write-only on the wire —
// GetServerConfig leaves it blank (never echo the cleartext to the browser);
// `grpc_password_set` reports whether one is currently armed.
message ServerConfig {
  string server_name = 1;
  uint32 max_peers = 2;
  uint32 idle_kick_secs = 3;
  string grpc_password = 4;         // blank in responses; only meaningful on SetServerPassword
  bool grpc_password_set = 5;       // response-only: is a server password armed?
  bool named_channels_enabled = 6;  // gate the named-channels feature
  // Voice codec/quality clients are asked to use: 0=Raw PCM (no
  // compression), 1=Low (~16k), 2=Standard (~24k), 3=High (~32k Opus).
  uint32 audio_quality = 7;
  // When on, identity-less registers are rejected — every member must
  // present a verified keypair identity, which makes identity bans
  // airtight (an evader can no longer connect anonymously). Off by
  // default so open/legacy deployments keep working unchanged.
  bool require_identity = 8;
  // When on (the default), callsigns must be unique across connected
  // members: a register or rename onto a name already in use is
  // refused. Case-insensitive. Off restores the legacy behaviour where
  // duplicate callsigns are allowed.
  bool unique_callsigns = 9;
  // When on (the default), clients using Opus enable DTX (discontinuous
  // transmission): silence is sent as tiny comfort-noise frames, cutting
  // the talker's outbound and the whole fan-out during gaps. No effect on
  // the raw-PCM path. Off only for debugging — DTX has no audible cost.
  bool opus_dtx = 10;
  // Opus frame duration the server advertises to clients: 10, 20, or 40 ms.
  // Default 10 ms (absent = legacy). See RegisterResponse.opus_frame_ms.
  uint32 opus_frame_ms = 11;
}

// ── Requests / responses ──────────────────────────────────────────

message WatchRequest {}
message GetServerInfoRequest {}
message GetServerConfigRequest {}

message UpdateServerConfigRequest {
  string server_name = 1;
  uint32 max_peers = 2;
  uint32 idle_kick_secs = 3;
  bool named_channels_enabled = 4;
  uint32 audio_quality = 5;         // 0=Raw, 1=Low, 2=Standard, 3=High
  // Reject identity-less registers (see ServerConfig.require_identity).
  bool require_identity = 6;
  // Enforce unique callsigns (see ServerConfig.unique_callsigns).
  bool unique_callsigns = 7;
  // Enable Opus DTX (see ServerConfig.opus_dtx).
  bool opus_dtx = 8;
  // Opus frame size (see ServerConfig.opus_frame_ms).
  uint32 opus_frame_ms = 9;
}

message SetServerPasswordRequest {
  string password = 1;              // empty disarms (open mode)
}
message SetServerPasswordResponse {}

message ChangePasswordRequest {
  string current = 1;
  string new_password = 2;
}
message ChangePasswordResponse {}

message KickClientRequest { string id = 1; }
message KickClientResponse {}

message MoveClientRequest {
  string id = 1;
  string frequency = 2;
}
message MoveClientResponse {}

message RenameClientRequest {
  string id = 1;
  string display_name = 2;
}
message RenameClientResponse {}

message SetPriorityRequest {
  string id = 1;
  bool grant = 2;
}
message SetPriorityResponse {}

message SetMuteRequest {
  string id = 1;
  bool muted = 2;                   // true = mute (silence), false = unmute
}
message SetMuteResponse {}

message BanClientRequest {
  string id = 1;                    // live session client_id to ban + kick
  string reason = 2;                // shown to the banned client on rejected registers
  // Also ban the machine hash the session presented (when it presented
  // one): a config wipe then mints a fresh identity but stays banned.
  bool ban_machine = 3;
}
message BanClientResponse {}

message ListBansRequest {}
message ListBansResponse {
  repeated BanRecord bans = 1;      // newest-first
}

message BanRecord {
  string pubkey = 1;                // banned identity key, lowercase hex (the ban key)
  string display_id = 2;            // its 8-char fingerprint, for display
  string last_callsign = 3;         // display name at ban time (display aid)
  string machine_hash = 4;          // non-empty → the machine tier is banned too
  string reason = 5;
  string banned_by = 6;             // admin username
  uint64 banned_at_unix = 7;
}

message LiftBanRequest { string pubkey = 1; }
message LiftBanResponse {}

message SetChannelMuteRequest {
  string frequency = 1;             // canonical "446.05"
  bool muted = 2;                   // true = mute the channel, false = unmute
}
message SetChannelMuteResponse {}

message SetChannelNameRequest {
  string frequency = 1;             // canonical "446.05"
  string name = 2;                  // ≤16 chars; empty clears the name
}
message SetChannelNameResponse {}

message ClearAllChannelNamesRequest {}
message ClearAllChannelNamesResponse {}

// ── Metrics ───────────────────────────────────────────────────────

// One sampled data point. `rx/tx_bytes_per_sec` are the average voice-
// relay (UDP) throughput over the sample interval — ingress (client→
// server) and egress (server→client). gRPC signaling traffic is not
// counted (negligible next to audio).
message MetricSample {
  uint64 ts_unix = 1;               // sample time, unix seconds
  uint64 rx_bytes_per_sec = 2;      // ingress, bytes/s
  uint64 tx_bytes_per_sec = 3;      // egress, bytes/s
  uint32 users = 4;                 // connected peers at sample time
  uint32 transmitting = 5;          // peers holding a PTT floor
}

enum MetricsWindow {
  METRICS_WINDOW_HOUR = 0;          // last 60 min
  METRICS_WINDOW_DAY = 1;           // last 24 h
  METRICS_WINDOW_WEEK = 2;          // last 7 d
}

message MetricsRequest {
  MetricsWindow window = 1;
}
message MetricsResponse {
  repeated MetricSample samples = 1; // oldest → newest, downsampled
}

// ── Host health ───────────────────────────────────────────────────

message GetServerHealthRequest {}
message ServerHealth {
  double cpu_percent = 1;           // process+system CPU, 0..100
  uint64 mem_used_bytes = 2;
  uint64 mem_total_bytes = 3;
  uint64 disk_used_bytes = 4;       // for the data-dir's filesystem
  uint64 disk_total_bytes = 5;
}

// ── Audit log ─────────────────────────────────────────────────────

message AuditEntry {
  uint64 id = 1;                    // monotonic row id (paging cursor)
  uint64 ts_unix = 2;
  string kind = 3;                  // e.g. "kick", "connect", "auth-fail"
  string actor = 4;                 // admin user / callsign / "SYSTEM"
  string frequency = 5;             // canonical freq, or "" if N/A
  string detail = 6;                // free-text description
}

// Coarse server-side category filter (kinds are bucketed deterministically;
// see the audit recorder for the kind vocabulary).
enum AuditFilter {
  AUDIT_FILTER_ALL = 0;
  AUDIT_FILTER_ADMIN = 1;           // operator actions (kick/move/rename/…/config)
  AUDIT_FILTER_CONNECTIONS = 2;     // peer connect / disconnect
  AUDIT_FILTER_SECURITY = 3;        // auth success / failure
}

message AuditLogRequest {
  AuditFilter filter = 1;
  uint32 limit = 2;                 // page size (server caps it)
  uint64 before_id = 3;             // 0 = newest page; else id < before_id
}
message AuditLogResponse {
  repeated AuditEntry entries = 1;  // newest-first
  uint64 total = 2;                 // total matching the filter
}
