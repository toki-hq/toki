syntax = "proto3";

package toki.v1;

// Signaling service for the Toki walkie-talkie network.
// Audio frames travel out-of-band over UDP; this service carries
// authentication, room membership, and presence/PTT events.
//
// Toki has a single global room — there's no channel addressing.
// After registering, a client subscribes to receive presence and PTT
// broadcasts; a separate streaming RPC carries the client's own PTT
// state transitions to the server.
service Signaling {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Join(JoinRequest) returns (stream Event);
  rpc Leave(LeaveRequest) returns (LeaveResponse);

  // Client streams PTT state transitions (key down / key up).
  // Server multicasts these as Events to every other subscriber
  // via the Join stream.
  rpc PushToTalk(stream PttEvent) returns (PttAck);
}

message RegisterRequest {
  string display_name = 1;
}

message RegisterResponse {
  string client_id = 1;
  // Token the client must echo in the first UDP audio packet
  // so the server can associate the UDP flow with this session.
  bytes audio_token = 2;
  // UDP endpoint the client should send audio to.
  string audio_endpoint = 3;
}

message JoinRequest {
  string client_id = 1;
}

message LeaveRequest {
  string client_id = 1;
}

message LeaveResponse {}

message Event {
  oneof event {
    MemberJoined joined = 1;
    MemberLeft left = 2;
    PttEvent ptt = 3;
  }
}

message MemberJoined {
  string client_id = 1;
  string display_name = 2;
}

message MemberLeft {
  string client_id = 1;
}

message PttEvent {
  string client_id = 1;
  bool pressed = 2;
  uint64 sequence = 3;
}

message PttAck {}
