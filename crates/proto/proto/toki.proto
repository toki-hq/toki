syntax = "proto3";

package toki.v1;

// Signaling service for the Toki walkie-talkie network.
// Audio frames travel out-of-band over UDP; this service carries
// authentication, room membership, and presence/PTT events.
//
// Toki addresses rooms by *frequency* — a string like "446.05" naming
// a discrete radio channel (446.00–448.00 MHz in 0.05 MHz steps). The
// server keeps one logical room per frequency; clients move between
// them via `ChangeFrequency` without re-opening the event stream.
service Signaling {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Join(JoinRequest) returns (stream Event);
  rpc Leave(LeaveRequest) returns (LeaveResponse);
  rpc ChangeFrequency(ChangeFrequencyRequest) returns (ChangeFrequencyResponse);

  // Client streams PTT state transitions (key down / key up).
  // Server multicasts these as Events to every other member of
  // the sender's current frequency room.
  rpc PushToTalk(stream PttEvent) returns (PttAck);

  // Fetch a short-lived challenge nonce to sign in the subsequent
  // `Register` call. Part of the optional client-identity handshake:
  // the client proves possession of its ed25519 private key by signing
  // the nonce (see `RegisterRequest.identity_signature`), which stops
  // anyone who merely *sees* an identity string (admin panel, audit
  // log) from impersonating it. The nonce is opaque to the client —
  // echo it back verbatim. It expires after ~60 s; on a stale-nonce
  // rejection from Register, fetch a fresh one and retry.
  // Identity-less clients never call this.
  rpc IdentityChallenge(IdentityChallengeRequest) returns (IdentityChallengeResponse);

  // Periodic client→server report of the connection quality the client
  // is *measuring locally* on the inbound audio path: round-trip time
  // (from the UDP keepalive/pong probe), inter-arrival jitter, and
  // packet-loss rate (from gaps in the server→client sequence numbers).
  // The server can't compute these itself — only the receiver sees its
  // own loss/jitter, and RTT is a client-stamped round trip — so the
  // client pushes them up roughly every few seconds for the admin
  // dashboard. Best-effort and advisory: dropping a report only delays
  // the panel's next refresh. Sent on a fire-and-forget cadence; the
  // unary response is empty.
  rpc ReportConnectionQuality(ConnectionQualityReport) returns (ConnectionQualityAck);
}

// One client-measured connection-quality sample. All three metrics are
// computed on the client over a short sliding window and reported as of
// "now"; absent/zero means "not yet measured" (e.g. RTT before the
// first pong, loss before enough packets have arrived to estimate it).
message ConnectionQualityReport {
  string client_id = 1;
  // Smoothed round-trip time in milliseconds, from the keepalive/pong
  // probe. 0 until the first pong lands.
  uint32 rtt_ms = 2;
  // Inter-arrival jitter in milliseconds (mean deviation of S2C packet
  // spacing from the nominal 10 ms cadence).
  uint32 jitter_ms = 3;
  // Inbound packet-loss percentage over the window, 0–100, ×100 for two
  // decimals of resolution (e.g. 250 = 2.50%). Derived from S2C seq gaps.
  uint32 loss_pct_centi = 4;
}

message ConnectionQualityAck {}

message IdentityChallengeRequest {}

message IdentityChallengeResponse {
  // Opaque challenge blob. Stateless on the server side (it embeds a
  // timestamp + HMAC, so no per-nonce table is kept); the client signs
  // the domain-separated payload `"toki-register-v1" || nonce` and
  // sends both the nonce and the signature in `Register`.
  bytes nonce = 1;
}

message RegisterRequest {
  string display_name = 1;
  // Shared-secret password the server may require before accepting a
  // registration. Empty string when the client has no password
  // configured; servers running in open mode ignore the field entirely.
  // Servers comparing the password do so in constant time and reject
  // mismatches with gRPC status `UNAUTHENTICATED`.
  string password = 2;
  // The client's own semantic version (`CARGO_PKG_VERSION`, e.g.
  // "0.3.1"). The server requires the same MAJOR.MINOR as itself —
  // patch differences are fine — and rejects a mismatch with gRPC
  // status `FAILED_PRECONDITION` so the user gets a clear "please
  // update" instead of silently broken audio (the UDP wire format can
  // change across minor versions). Empty / unparseable is treated as
  // incompatible (pre-gate clients predate the matching wire format).
  string client_version = 3;

  // ── Optional client identity ──────────────────────────────────────
  // A self-generated, keypair-backed identity (see notes in the repo's
  // identity spec). All five fields are either present together or all
  // absent; an absent identity (empty `identity_pubkey`) is accepted —
  // the session simply has no identity. A *present but invalid* one
  // (bad signature, stale nonce, malformed key) is rejected with
  // `UNAUTHENTICATED` rather than silently downgraded, so an
  // impersonation attempt never lands as "anonymous but connected".

  // 32-byte ed25519 public key. This *is* the identity — everything
  // else (display string, attributes) derives from or attaches to it.
  bytes identity_pubkey = 4;
  // The nonce obtained from `IdentityChallenge`, echoed verbatim.
  bytes challenge_nonce = 5;
  // 64-byte ed25519 signature over `"toki-register-v1" || nonce`
  // (domain-separated so a register signature can't be replayed in
  // any other future signing context).
  bytes identity_signature = 6;
  // Salted hash of the machine identifier, as lowercase hex:
  // BLAKE3("toki-machine-fp-v1" || machine_id) where machine_id is the
  // OS machine id (falling back to a primary MAC). Never the raw
  // value. Travels alongside the key — NOT inside its derivation — so
  // the identity survives moving the key file to a new machine, while
  // a config wipe yields a fresh identity but the *same* machine hash
  // (ban-evasion correlation). Claimed, not provable.
  string machine_hash = 7;
  // The first session client_id this identity was ever assigned by any
  // server, recorded at identity generation. Informational/claimed —
  // a provenance breadcrumb, not an authenticated fact.
  string origin_client_id = 8;
}

message RegisterResponse {
  string client_id = 1;
  // 16-byte token the client must echo in every UDP audio packet
  // so the server can identify the session.
  bytes audio_token = 2;
  // UDP endpoint the client should send audio to.
  string audio_endpoint = 3;
  // 32-byte symmetric key for authenticating UDP audio packets.
  // The client keyed-hashes each outbound packet (version || seq ||
  // payload) with BLAKE3 and appends the first 8 bytes of the
  // result as a MAC; the server rejects packets whose MAC doesn't
  // verify (forgery / off-path injection) or whose `seq` is not
  // strictly greater than the last accepted seq for the same
  // session (replay). The key never leaves either endpoint after
  // this handshake.
  bytes audio_mac_key = 4;

  // Codec the operator wants this client to send. When false the
  // client sends raw PCM (the legacy path); when true it Opus-encodes
  // at `opus_bitrate` bits/sec. Advisory — the server relays whatever
  // codec arrives and receivers decode per-packet — but honoring it
  // lets the operator trade bandwidth for quality server-wide.
  bool opus_enabled = 5;
  uint32 opus_bitrate = 6;
  // When true (and opus_enabled), the client turns on Opus DTX
  // (discontinuous transmission): during silence the encoder emits tiny
  // comfort-noise frames instead of full ~30-byte frames, which cuts the
  // talker's outbound — and therefore the whole per-listener fan-out —
  // for the silent fraction of a transmission. Decodes transparently on
  // the existing path; no effect on the raw-PCM path. Advisory like the
  // other codec fields.
  bool opus_dtx = 7;
}

message JoinRequest {
  string client_id = 1;
  // Initial frequency room to join, e.g. "446.05".
  string frequency = 2;
}

message LeaveRequest {
  string client_id = 1;
}

message LeaveResponse {}

// Move the client from their current frequency room to a new one. The
// server emits MemberLeft to the old room, MemberJoined to the new
// room (including a roster backfill on the client's own event stream),
// and clears any held PTT lock on the old room.
message ChangeFrequencyRequest {
  string client_id = 1;
  string frequency = 2;
}

message ChangeFrequencyResponse {}

message Event {
  oneof event {
    MemberJoined joined = 1;
    MemberLeft left = 2;
    PttEvent ptt = 3;
    // Sent when the server moves us between rooms — gives the UI a
    // confirmed "you are now on frequency X" signal so it can render
    // a clean roster (the surrounding Joined/Left events fill it).
    FrequencyChanged frequency_changed = 4;
    // Sent when a member's display_name is updated server-side
    // (today: triggered exclusively by the admin panel's rename
    // action). Broadcast to every member of the renamed user's
    // current room *and* to the renamed user's own stream — the
    // subject compares `client_id` against their own id to know
    // whether their topbar callsign needs refreshing.
    DisplayNameChanged display_name_changed = 5;
    // Sent when the admin-assigned human-readable name of a frequency
    // changes, or to deliver the current name on Join / ChangeFrequency.
    // Only emitted while the server's `named_channels_enabled` setting is
    // on; an empty `name` means the channel has no name (cleared). The
    // client compares `frequency` against its current tuning before
    // applying. See `ChannelNameChanged`.
    ChannelNameChanged channel_name_changed = 6;
    // Sent when an admin mutes or unmutes a member (see Admin.SetMute).
    // Broadcast to every member of the subject's current room *and* to
    // the subject's own stream. The subject compares `client_id` against
    // its own id: when it's the subject and `muted` is true, the client
    // suppresses its own PTT/mic locally (so it doesn't keep firing
    // futile presses the server will drop) and shows a "muted by
    // operator" cue; other members light a muted badge on that member.
    MuteChanged mute_changed = 7;
    // Sent when an admin mutes/unmutes a whole channel (see
    // Admin.SetChannelMute), and on Join / ChangeFrequency to deliver
    // the current channel's mute state. Broadcast to every member of the
    // affected frequency. The client compares `frequency` against its
    // current tuning: while its channel is muted it can't transmit and
    // the PTT button shows the disabled "unable to talk" cue.
    ChannelMuteChanged channel_mute_changed = 8;
    // Sent to a member when an admin grants or revokes their *priority
    // speaker* standing (see Admin.SetPriority), and on Join /
    // ChangeFrequency to deliver current standing. Addressed only to the
    // subject (priority is a per-session, per-channel grant). The client
    // tracks it so a priority speaker on a muted (No-Talk) channel keeps
    // a live PTT button instead of the "unable to talk" cue — they are
    // the granted-voice exception. `frequency` is the channel the grant
    // is bound to; `granted = false` clears it.
    PriorityChanged priority_changed = 9;
  }
}

message MemberJoined {
  string client_id = 1;
  string display_name = 2;
}

message MemberLeft {
  string client_id = 1;
}

message FrequencyChanged {
  string frequency = 1;
}

message DisplayNameChanged {
  string client_id = 1;
  string display_name = 2;
}

// The admin-assigned name of a frequency channel (≤16 chars). An empty
// `name` means the channel is unnamed (e.g. the admin cleared it). Sent
// on Join/ChangeFrequency backfill and whenever the admin sets or clears
// a name — but only while the server has named channels enabled.
message ChannelNameChanged {
  string frequency = 1;
  string name = 2;
}

// A member's server-side mute state changed (see Admin.SetMute).
message MuteChanged {
  string client_id = 1;
  bool muted = 2;
}

// A channel's mute state changed (see Admin.SetChannelMute), or the
// current state delivered on Join / ChangeFrequency.
message ChannelMuteChanged {
  string frequency = 1;
  bool muted = 2;
}

// A member's priority-speaker standing changed (see Admin.SetPriority),
// or current standing delivered on Join / ChangeFrequency. Addressed to
// the subject only. `frequency` is the channel the grant is bound to
// (empty when revoked).
message PriorityChanged {
  string client_id = 1;
  string frequency = 2;
  bool granted = 3;
}

message PttEvent {
  string client_id = 1;
  bool pressed = 2;
  uint64 sequence = 3;
  // True when the floor is being granted to a *priority* speaker on
  // this channel — either because a priority member keyed up on an
  // idle channel, or because they preempted a non-priority holder.
  // Clients use this to play the distinctive two-tone priority roger
  // instead of the normal acquire beep. Always false on release
  // (pressed = false) and on ordinary non-priority grants. Defaults
  // to false, so older clients simply treat priority traffic as a
  // normal take-floor.
  bool priority = 4;
}

message PttAck {}
