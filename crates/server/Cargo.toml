[package]
name = "toki-server"
version.workspace = true
edition.workspace = true

[[bin]]
name = "toki-server"
path = "src/bin/main.rs"

[dependencies]
toki-proto = { workspace = true }
tokio = { workspace = true }
tokio-stream = "0.1"
tonic = { workspace = true }
prost = { workspace = true }
bytes = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }
serde = { workspace = true }
toml = "0.8"
# BLAKE3 of the session token is stored in the registry rather than
# the token itself, so a process memory snapshot or core dump doesn't
# leak live session credentials. ~1 GB/s on a single core — no
# measurable cost on the audio hot path.
blake3 = "1"
chacha20poly1305 = { workspace = true }
