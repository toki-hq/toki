<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Toki — admin</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!--
    Toki admin panel shell.

    The whole UI lives in a single document; `app.js` toggles
    `<main data-view="…">` to swap between login / loading / dashboard.
    Inside the dashboard, a section router replaces the contents of
    `#section-host` based on the sidebar selection.

    Pure HTML + vanilla JS — no build step. The CSS lives in
    `/static/style.css` and is documented inline there.
  -->
  <div id="app">
    <main id="main" data-view="loading">
      <!-- ── LOADING ───────────────────────────────────────────── -->
      <section class="view-loading">
        <p>· LOADING ·</p>
      </section>

      <!-- ── LOGIN ─────────────────────────────────────────────── -->
      <section class="view-login">
        <form id="login-form" class="login-card">
          <h1>Sign in</h1>
          <p class="sub">· ADMIN PANEL ·</p>
          <label>
            USERNAME
            <input class="input" type="text" name="username" required autocomplete="username" autofocus />
          </label>
          <label>
            PASSWORD
            <input class="input" type="password" name="password" required autocomplete="current-password" />
          </label>
          <button type="submit" class="btn phos lg" style="justify-content: center;">SIGN IN</button>
          <p class="error" id="login-error" hidden></p>
        </form>
      </section>

      <!-- ── DASHBOARD ─────────────────────────────────────────── -->
      <section class="view-dashboard">
        <!-- Header (live data populated by JS) -->
        <header class="topbar" style="display: none;" id="topbar">
          <div class="brand">
            <span class="toki">TOKI</span>
            <span class="sep">·</span>
            <span class="admin">ADMIN</span>
            <span class="version mono" id="brand-version">v—</span>
          </div>
          <div class="stats">
            <div class="stat">
              <span class="stat-label">HOST</span>
              <span class="stat-value" id="stat-host">—</span>
            </div>
            <div class="stat">
              <span class="stat-label">UPTIME</span>
              <span class="stat-value" id="stat-uptime">—</span>
            </div>
            <div class="stat">
              <span class="stat-label">PEERS</span>
              <span class="stat-value" id="stat-peers">—</span>
            </div>
            <div class="stat">
              <span class="stat-label">TX</span>
              <span class="stat-value" id="stat-tx">—</span>
            </div>
          </div>
          <div class="right">
            <span class="conn-pill" id="conn-pill" title="live feed status">
              <span class="dot"></span>
              <span id="conn-label">CONNECTING</span>
            </span>
            <button id="logout" class="user-pill" title="sign out">
              <span>ADMIN</span>
              <span>↪</span>
            </button>
          </div>
        </header>

        <div style="flex: 1; display: flex; min-height: 0;">
          <!-- Sidebar (sections + quick links + build footer) -->
          <nav class="sidebar" id="sidebar" style="display: none;">
            <span class="tag">· NAV ·</span>
            <ul class="nav-list" id="nav-list">
              <!-- Buttons appended by app.js so the active flag is data-driven -->
            </ul>

            <div class="sidebar-group">
              <span class="tag">· QUICK ·</span>
              <ul class="quick-list">
                <li><button class="quick-btn" data-quick="logout"><span class="quick-icon">↪</span><span class="quick-text">Sign out</span></button></li>
              </ul>
            </div>

            <div class="sidebar-foot">
              <div id="build-line">BUILD —</div>
              <div id="started-line">—</div>
              <div class="health" id="health-line">healthy</div>
            </div>
          </nav>

          <!-- Content area — the active section's HTML lands here. -->
          <div class="content" id="content" style="display: none;"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- Toast for action acknowledgements (kick OK, move OK, etc) -->
  <div id="toast" class="toast hidden"></div>

  <script src="/static/app.js" defer></script>
</body>
</html>
